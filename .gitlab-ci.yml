stages:
  - lint
  - test

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^release\/.+/'
    - when: never

default:
  image: python:3.11
  before_script:
    - python -V
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"

lint:
  stage: lint
  script:
    - ruff check src tests
    - ruff format --check src tests

test:
  stage: test
  script:
    - pytest tests/ -v --tb=short --strict-markers
